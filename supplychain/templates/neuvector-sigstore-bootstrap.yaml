apiVersion: batch/v1
kind: Job
metadata:
  name: configure-neuvector-sigstore
  namespace: caddy-secure
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  template:
    spec:
      containers:
      - name: configure-api
        image: rancher/shell:v0.6.2
        imagePullPolicy: IfNotPresent
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        resources: {}
        env:
          - name: NV_USERNAME
            valueFrom:
              secretKeyRef:
                name: neuvector-api-credentials
                key: username
          - name: NV_PASSWORD
            valueFrom:
              secretKeyRef:
                name: neuvector-api-credentials
                key: password
        command: ["/bin/sh", "-c"]
        args:
          - |
            echo "1. Authenticating to NeuVector API..."
            NV_API="https://neuvector-svc-controller.cattle-neuvector-system.svc.cluster.local:10443/v1"

            AUTH_PAYLOAD=$(jq -n --arg user "$NV_USERNAME" --arg pass "$NV_PASSWORD" '{"password": {"username": $user, "password": $pass}}')
            
            AUTH_RESP=$(curl -sk -X POST "${NV_API}/auth" -H "Content-Type: application/json" -d "$AUTH_PAYLOAD")
            TOKEN=$(echo $AUTH_RESP | jq -r '.token.token // empty')
            
            if [ -z "$TOKEN" ]; then
              echo "ERROR: Authentication failed! API Response:"
              echo "$AUTH_RESP"
              exit 1
            fi
            
            echo -e "\n2. Scrubbing previous state for idempotency..."
            # FIXED: Explicitly delete existing objects so we never hit a collision error
            curl -sk -X DELETE "${NV_API}/scan/sigstore/root_of_trust/suseappco" -H "X-Auth-Token: ${TOKEN}" > /dev/null
            curl -sk -X DELETE "${NV_API}/scan/registry/SUSE-AppCo" -H "X-Auth-Token: ${TOKEN}" > /dev/null
            curl -sk -X DELETE "${NV_API}/scan/registry/DockerHub-Test" -H "X-Auth-Token: ${TOKEN}" > /dev/null
            
            echo "KV store wiped. Waiting 3 seconds for synchronization..."
            sleep 3
            
            echo -e "\n3. Creating SUSE AppCo Root of Trust..."
            ROT_PAYLOAD='{"name": "suseappco", "rootless_keypairs_only": true, "comment": "Programmatic GitOps SUSE AppCo Root of Trust"}'
            
            curl -sk -w "\nHTTP Status: %{http_code}\n" -X POST "${NV_API}/scan/sigstore/root_of_trust" \
              -H "Content-Type: application/json" \
              -H "X-Auth-Token: ${TOKEN}" \
              -d "$ROT_PAYLOAD"
            
            sleep 3
            
            echo -e "\n4. Registering the Keypair Verifier..."
            VERIFIER_PAYLOAD=$(jq -n \
              --arg name "suseappcokey" \
              --arg type "keypair" \
              --rawfile pub /keys/appco-pubkey.pem \
              '{name: $name, verifier_type: $type, public_key: $pub}')
            
            curl -sk -w "\nHTTP Status: %{http_code}\n" -X POST "${NV_API}/scan/sigstore/root_of_trust/suseappco/verifier" \
              -H "Content-Type: application/json" \
              -H "X-Auth-Token: ${TOKEN}" \
              -d "$VERIFIER_PAYLOAD"
            
            echo -e "\n5. Activating Admission Control Webhook..."
            ADM_PAYLOAD='{"state": {"enable": true, "mode": "protect", "default_action": "allow"}}'
            
            curl -sk -w "\nHTTP Status: %{http_code}\n" -X PATCH "${NV_API}/admission/state" \
              -H "Content-Type: application/json" \
              -H "X-Auth-Token: ${TOKEN}" \
              -d "$ADM_PAYLOAD"
            
            echo -e "\n6. Configuring SUSE AppCo & Docker Hub Registries..."
            REG_USER=$(jq -r '.auths["dp.apps.rancher.io"].username' /regcreds/.dockerconfigjson)
            REG_PASS=$(jq -r '.auths["dp.apps.rancher.io"].password' /regcreds/.dockerconfigjson)
            
            APPCO_PAYLOAD=$(jq -n \
              --arg user "$REG_USER" \
              --arg pass "$REG_PASS" \
              '{config: {name: "SUSE-AppCo", registry_type: "Docker Registry", registry: "https://dp.apps.rancher.io", filters: ["containers/caddy:2.11.4"], username: $user, password: $pass}}')
            
            echo "-> Creating SUSE-AppCo Registry:"
            curl -sk -w "\nHTTP Status: %{http_code}\n" -X POST "${NV_API}/scan/registry" \
              -H "Content-Type: application/json" \
              -H "X-Auth-Token: ${TOKEN}" \
              -d "$APPCO_PAYLOAD"
            
            DOCKER_PAYLOAD='{"config": {"name": "DockerHub-Test", "registry_type": "Docker Registry", "registry": "https://registry-1.docker.io", "filters": ["library/caddy:latest"]}}'
            
            echo "-> Creating DockerHub-Test Registry:"
            curl -sk -w "\nHTTP Status: %{http_code}\n" -X POST "${NV_API}/scan/registry" \
              -H "Content-Type: application/json" \
              -H "X-Auth-Token: ${TOKEN}" \
              -d "$DOCKER_PAYLOAD"

            sleep 3

            echo -e "\n7. Triggering Initial Registry Scans..."
            echo "-> Scanning SUSE-AppCo:"
            curl -sk -w "\nHTTP Status: %{http_code}\n" -X POST "${NV_API}/scan/registry/SUSE-AppCo/scan" \
              -H "Content-Type: application/json" \
              -H "X-Auth-Token: ${TOKEN}"
              
            echo "-> Scanning DockerHub-Test:"
            curl -sk -w "\nHTTP Status: %{http_code}\n" -X POST "${NV_API}/scan/registry/DockerHub-Test/scan" \
              -H "Content-Type: application/json" \
              -H "X-Auth-Token: ${TOKEN}"
            
            echo -e "\n8. Holding GitOps pipeline for 60 seconds..."
            echo "Waiting for NeuVector's background scanner to download and verify signatures before deploying applications..."
            sleep 60
              
            echo -e "\nConfiguration complete!"
        volumeMounts:
        - name: pubkey-vol
          mountPath: /keys
        - name: regcred-vol
          mountPath: /regcreds
          readOnly: true
      restartPolicy: OnFailure
      volumes:
      - name: pubkey-vol
        configMap:
          name: suse-appco-public-key
      - name: regcred-vol
        secret:
          secretName: suse-appco-registry-secret