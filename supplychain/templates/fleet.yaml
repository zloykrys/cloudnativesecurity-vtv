defaultNamespace: mariadb-secure

labels:
  app: suse-appco-mariadb
  team: security-operations

targets:
  - name: development-or-test-clusters
    clusterSelector: {}

diff:
  comparePatches:
    - apiVersion: neuvector.com/v1
      kind: NvAdmissionControlSecurityRule
      name: enforce-appco-signature
      operations:
        - op: remove
          path: /spec/rules/0/ruleType
        - op: remove
          path: /spec/rules/1/ruleType
        - op: remove
          path: /metadata/annotations
        - op: remove
          path: /metadata/labels
