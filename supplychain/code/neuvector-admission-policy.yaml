apiVersion: neuvector.com/v1
kind: NvAdmissionControlSecurityRule
metadata:
  name: local
spec:
  rules:
    - id: 10001
      action: allow
      comment: "Allow explicitly signed SUSE AppCo MariaDB images"
      criteria:
        # FIXED: Admission Control requires "is", "isNot", or "containsAny"
        - name: namespace
          op: is 
          value: mariadb-secure
        - name: imageVerifiers
          op: containsAny
          value: suse-appco/suse-appco-key

    - id: 10002
      action: deny
      comment: "Default Deny: Block all unverified images in this namespace"
      criteria:
        # FIXED: Operator updated to "is"
        - name: namespace
          op: is
          value: mariadb-secure