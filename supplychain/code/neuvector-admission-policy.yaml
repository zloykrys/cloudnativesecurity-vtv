apiVersion: neuvector.com/v1
kind: NvAdmissionControlSecurityRule
metadata:
  name: local
  # THE FIX: Deploy the policy before the main applications, and load it before the Job runs
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
spec:
  rules:
    - id: 110002
      action: allow
      comment: "Allow Rancher utility shell for NeuVector API bootstrapping"
      criteria:
        - name: namespace
          op: containsAny 
          value: caddy-secure
        - name: image
          op: containsAny
          value: rancher/shell

    - id: 110003
      action: allow
      comment: "Allow explicitly signed SUSE AppCo Caddy images"
      criteria:
        - name: namespace
          op: containsAny 
          value: caddy-secure
        - name: imageVerifiers
          op: containsAny
          value: suseappco/suseappcokey

    - id: 110004
      action: deny
      comment: "Default Deny: Block all unverified images in this namespace"
      criteria:
        - name: namespace
          op: containsAny
          value: caddy-secure