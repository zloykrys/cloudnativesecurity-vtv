apiVersion: batch/v1
kind: Job
metadata:
  name: configure-neuvector-sigstore
  namespace: caddy-secure
  annotations:
    # FIXED: Run BEFORE the Caddy deployment is applied
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  template:
    spec:
      containers:
      - name: configure-api
        image: rancher/shell:v0.6.2
        imagePullPolicy: IfNotPresent
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        resources: {}
        env:
          - name: NV_USERNAME
            valueFrom:
              secretKeyRef:
                name: neuvector-api-credentials
                key: username
          - name: NV_PASSWORD
            valueFrom:
              secretKeyRef:
                name: neuvector-api-credentials
                key: password
        command: ["/bin/sh", "-c"]
        args:
          - |
            echo "1. Authenticating to NeuVector API..."
            NV_API="https://neuvector-svc-controller.cattle-neuvector-system.svc.cluster.local:10443/v1"

            AUTH_PAYLOAD=$(jq -n --arg user "$NV_USERNAME" --arg pass "$NV_PASSWORD" '{"password": {"username": $user, "password": $pass}}')
            
            AUTH_RESP=$(curl -sk -X POST "${NV_API}/auth" -H "Content-Type: application/json" -d "$AUTH_PAYLOAD")
            TOKEN=$(echo $AUTH_RESP | jq -r '.token.token // empty')
            
            if [ -z "$TOKEN" ]; then
              echo "ERROR: Authentication failed! API Response:"
              echo "$AUTH_RESP"
              exit 1
            fi
            
            echo -e "\n2. Creating SUSE AppCo Root of Trust..."
            # FIXED: Removed hyphens from the name
            ROT_PAYLOAD='{"name": "suseappco", "rootless_keypairs_only": true, "comment": "Programmatic GitOps SUSE AppCo Root of Trust"}'
            
            ROT_RESP=$(curl -sk -X POST "${NV_API}/scan/sigstore/root_of_trust" \
              -H "Content-Type: application/json" \
              -H "X-Auth-Token: ${TOKEN}" \
              -d "$ROT_PAYLOAD")
            echo "API Response: $ROT_RESP"
            
            echo -e "\nWaiting 3 seconds for KV store replication..."
            sleep 3
            
            echo -e "\n3. Registering the Keypair Verifier..."
            VERIFIER_PAYLOAD=$(jq -n \
              --arg name "suseappcokey" \
              --arg type "keypair" \
              --rawfile pub /keys/appco-pubkey.pem \
              '{name: $name, verifier_type: $type, public_key: $pub}')
            
            # FIXED: Path updated to match the hyphen-less root of trust
            VERIFIER_RESP=$(curl -sk -X POST "${NV_API}/scan/sigstore/root_of_trust/suseappco/verifier" \
              -H "Content-Type: application/json" \
              -H "X-Auth-Token: ${TOKEN}" \
              -d "$VERIFIER_PAYLOAD")
            echo "API Response: $VERIFIER_RESP"
            
            echo -e "\n4. Activating Admission Control Webhook..."
            ADM_PAYLOAD='{"state": {"enable": true, "mode": "protect", "default_action": "allow"}}'
            
            # FIXED: Added HTTP status code flag so we can see the '200' success!
            ADM_RESP=$(curl -sk -w "\nHTTP Status: %{http_code}" -X PATCH "${NV_API}/admission/state" \
              -H "Content-Type: application/json" \
              -H "X-Auth-Token: ${TOKEN}" \
              -d "$ADM_PAYLOAD")
            echo "API Response: $ADM_RESP"
            
            echo -e "\n5. Configuring SUSE AppCo Registry in NeuVector..."
            REG_USER=$(jq -r '.auths["dp.apps.rancher.io"].username' /regcreds/.dockerconfigjson)
            REG_PASS=$(jq -r '.auths["dp.apps.rancher.io"].password' /regcreds/.dockerconfigjson)
            
            # FIXED: Correct JSON schema key is 'registry_type'
            REG_PAYLOAD=$(jq -n \
              --arg user "$REG_USER" \
              --arg pass "$REG_PASS" \
              '{config: {name: "SUSE-AppCo", registry_type: "Docker Registry", registry: "https://dp.apps.rancher.io", filters: ["containers/caddy:2.11.4"], username: $user, password: $pass}}')
            
            # FIXED: The endpoint is /scan/registry, not /registry
            REG_RESP=$(curl -sk -X POST "${NV_API}/scan/registry" \
              -H "Content-Type: application/json" \
              -H "X-Auth-Token: ${TOKEN}" \
              -d "$REG_PAYLOAD")
            echo "API Response: $REG_RESP"

            echo -e "\n6. Triggering Initial Registry Scan..."
            # Programmatically trigger the scan for the newly created SUSE-AppCo registry
            SCAN_RESP=$(curl -sk -X POST "${NV_API}/scan/registry/SUSE-AppCo/scan" \
              -H "Content-Type: application/json" \
              -H "X-Auth-Token: ${TOKEN}")
            echo "API Response: $SCAN_RESP"
            
            echo -e "\n7. Holding GitOps pipeline for 60 seconds..."
            echo "Waiting for NeuVector's background scanner to download and verify the AppCo signatures before we allow Fleet to deploy Caddy..."
            sleep 60
              
            echo -e "\nConfiguration complete!"
        volumeMounts:
        - name: pubkey-vol
          mountPath: /keys
        - name: regcred-vol
          mountPath: /regcreds
          readOnly: true
      restartPolicy: OnFailure
      volumes:
      - name: pubkey-vol
        configMap:
          name: suse-appco-public-key
      - name: regcred-vol
        secret:
          secretName: suse-appco-registry-secret