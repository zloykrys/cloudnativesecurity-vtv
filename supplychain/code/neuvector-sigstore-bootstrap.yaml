apiVersion: batch/v1
kind: Job
metadata:
  name: configure-neuvector-sigstore
  namespace: mariadb-secure
spec:
  template:
    spec:
      containers:
      - name: configure-api
        ttlSecondsAfterFinished: 60
        # Rancher's official utility shell image, can be any image that has curl and jq
        # define as per your Rancher version - the below is for 2.13.3 (Edge 3.5)
        image: rancher/shell:v0.6.2
        env:
          # Pull authentication credentials securely from the cluster secret
          - name: NV_USERNAME
            valueFrom:
              secretKeyRef:
                name: neuvector-api-credentials
                key: username
          - name: NV_PASSWORD
            valueFrom:
              secretKeyRef:
                name: neuvector-api-credentials
                key: password
        command: ["/bin/sh", "-c"]
        args:
          - |
            echo "1. Authenticating to NeuVector API..."
            NV_API="https://neuvector-svc-controller.cattle-neuvector-system.svc.cluster.local:10443/v1"

            # Safely build the Auth payload
            AUTH_PAYLOAD=$(jq -n --arg user "$NV_USERNAME" --arg pass "$NV_PASSWORD" '{"password": {"username": $user, "password": $pass}}')
            
            # Execute Auth and catch the token
            AUTH_RESP=$(curl -sk -X POST "${NV_API}/auth" -H "Content-Type: application/json" -d "$AUTH_PAYLOAD")
            TOKEN=$(echo $AUTH_RESP | jq -r '.token.token // empty')
            
            if [ -z "$TOKEN" ]; then
              echo "ERROR: Authentication failed! API Response:"
              echo "$AUTH_RESP"
              exit 1
            fi
            
            echo "2. Creating SUSE AppCo Root of Trust..."
            # Let curl output the raw response so we can see if it succeeds or fails
            curl -k -X POST "${NV_API}/scan/sigstore/root_of_trust" \
              -H "Content-Type: application/json" \
              -H "X-Auth-Token: ${TOKEN}" \
              -d '{
                    "name": "suse-appco",
                    "rootless_keypairs_only": true,
                    "comment": "Programmatic GitOps SUSE AppCo Root of Trust"
                  }'
            
            echo -e "\n\n3. Registering the Keypair Verifier..."
            
            # Let jq safely construct the complex JSON payload using the raw file contents
            VERIFIER_PAYLOAD=$(jq -n \
              --arg name "suse-appco-key" \
              --arg type "keypair" \
              --rawfile pub /keys/appco-pubkey.pem \
              '{name: $name, verifier_type: $type, public_key: $pub}')
            
            # Execute and print the response
            curl -k -X POST "${NV_API}/scan/sigstore/root_of_trust/suse-appco/verifier" \
              -H "Content-Type: application/json" \
              -H "X-Auth-Token: ${TOKEN}" \
              -d "$VERIFIER_PAYLOAD"
            
            echo -e "\n\nConfiguration complete!"
        volumeMounts:
        - name: pubkey-vol
          mountPath: /keys
      restartPolicy: OnFailure
      volumes:
      - name: pubkey-vol
        configMap:
          name: suse-appco-public-key