apiVersion: batch/v1
kind: Job
metadata:
  name: configure-neuvector-sigstore
  namespace: caddy-secure
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  template:
    spec:
      containers:
      - name: configure-api
        image: rancher/shell:v0.6.2
        imagePullPolicy: IfNotPresent
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        resources: {}
        env:
          - name: NV_USERNAME
            valueFrom:
              secretKeyRef:
                name: neuvector-api-credentials
                key: username
          - name: NV_PASSWORD
            valueFrom:
              secretKeyRef:
                name: neuvector-api-credentials
                key: password
        command: ["/bin/sh", "-c"]
        args:
          - |
            echo "1. Authenticating to NeuVector API..."
            NV_API="https://neuvector-svc-controller.cattle-neuvector-system.svc.cluster.local:10443/v1"

            AUTH_PAYLOAD=$(jq -n --arg user "$NV_USERNAME" --arg pass "$NV_PASSWORD" '{"password": {"username": $user, "password": $pass}}')
            
            AUTH_RESP=$(curl -sk -X POST "${NV_API}/auth" -H "Content-Type: application/json" -d "$AUTH_PAYLOAD")
            TOKEN=$(echo $AUTH_RESP | jq -r '.token.token // empty')
            
            if [ -z "$TOKEN" ]; then
              echo "ERROR: Authentication failed! API Response:"
              echo "$AUTH_RESP"
              exit 1
            fi
            
            echo -e "\n2. Creating SUSE AppCo Root of Trust..."
            ROT_PAYLOAD='{"name": "suse-appco", "rootless_keypairs_only": true, "comment": "Programmatic GitOps SUSE AppCo Root of Trust"}'
            
            ROT_RESP=$(curl -sk -X POST "${NV_API}/scan/sigstore/root_of_trust" \
              -H "Content-Type: application/json" \
              -H "X-Auth-Token: ${TOKEN}" \
              -d "$ROT_PAYLOAD")
            echo "API Response: $ROT_RESP"
            
            echo -e "\nWaiting 3 seconds for KV store replication..."
            sleep 3
            
            echo -e "\n3. Registering the Keypair Verifier..."
            VERIFIER_PAYLOAD=$(jq -n \
              --arg name "suse-appco-key" \
              --arg type "keypair" \
              --rawfile pub /keys/appco-pubkey.pem \
              '{name: $name, verifier_type: $type, public_key: $pub}')
            
            VERIFIER_RESP=$(curl -sk -X POST "${NV_API}/scan/sigstore/root_of_trust/suse-appco/verifier" \
              -H "Content-Type: application/json" \
              -H "X-Auth-Token: ${TOKEN}" \
              -d "$VERIFIER_PAYLOAD")
            echo "API Response: $VERIFIER_RESP"
            
            echo -e "\n4. Activating Admission Control Webhook..."
            ADM_PAYLOAD='{"state": {"enable": true, "mode": "protect", "default_action": "allow"}}'
            
            ADM_RESP=$(curl -sk -X PATCH "${NV_API}/admission/state" \
              -H "Content-Type: application/json" \
              -H "X-Auth-Token: ${TOKEN}" \
              -d "$ADM_PAYLOAD")
            echo "API Response: $ADM_RESP"
            
            echo -e "\n5. Configuring SUSE AppCo Registry in NeuVector..."
            # FIXED: Dynamically extract credentials from the mounted K8s secret
            REG_USER=$(jq -r '.auths["dp.apps.rancher.io"].username' /regcreds/.dockerconfigjson)
            REG_PASS=$(jq -r '.auths["dp.apps.rancher.io"].password' /regcreds/.dockerconfigjson)
            
            REG_PAYLOAD=$(jq -n \
              --arg user "$REG_USER" \
              --arg pass "$REG_PASS" \
              '{config: {name: "SUSE-AppCo", type: "docker", registry: "https://dp.apps.rancher.io", filters: ["*"], username: $user, password: $pass}}')
            
            REG_RESP=$(curl -sk -X POST "${NV_API}/registry" \
              -H "Content-Type: application/json" \
              -H "X-Auth-Token: ${TOKEN}" \
              -d "$REG_PAYLOAD")
            echo "API Response: $REG_RESP"
              
            echo -e "\nConfiguration complete!"
        volumeMounts:
        - name: pubkey-vol
          mountPath: /keys
        # FIXED: Mount the Kubelet registry secret so the job can read it
        - name: regcred-vol
          mountPath: /regcreds
          readOnly: true
      restartPolicy: OnFailure
      volumes:
      - name: pubkey-vol
        configMap:
          name: suse-appco-public-key
      # FIXED: Reference the pre-created AppCo secret
      - name: regcred-vol
        secret:
          secretName: suse-appco-registry-secret