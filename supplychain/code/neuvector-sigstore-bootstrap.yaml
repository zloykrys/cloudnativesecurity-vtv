apiVersion: batch/v1
kind: Job
metadata:
  name: configure-neuvector-sigstore
  namespace: mariadb-secure
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  template:
    spec:
      containers:
      - name: configure-api
        image: rancher/shell:v0.6.2
        imagePullPolicy: IfNotPresent
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        resources: {}
        env:
          - name: NV_USERNAME
            valueFrom:
              secretKeyRef:
                name: neuvector-api-credentials
                key: username
          - name: NV_PASSWORD
            valueFrom:
              secretKeyRef:
                name: neuvector-api-credentials
                key: password
        command: ["/bin/sh", "-c"]
        args:
          - |
            echo "1. Authenticating to NeuVector API..."
            NV_API="https://neuvector-svc-controller.cattle-neuvector-system.svc.cluster.local:10443/v1"

            AUTH_PAYLOAD=$(jq -n --arg user "$NV_USERNAME" --arg pass "$NV_PASSWORD" '{"password": {"username": $user, "password": $pass}}')
            
            AUTH_RESP=$(curl -sk -X POST "${NV_API}/auth" -H "Content-Type: application/json" -d "$AUTH_PAYLOAD")
            TOKEN=$(echo $AUTH_RESP | jq -r '.token.token // empty')
            
            if [ -z "$TOKEN" ]; then
              echo "ERROR: Authentication failed! API Response:"
              echo "$AUTH_RESP"
              exit 1
            fi
            
            echo -e "\n2. Creating SUSE AppCo Root of Trust..."
            # FIXED: Wrapped payload in the "root_of_trust" object
            ROT_PAYLOAD='{"root_of_trust": {"name": "suse-appco", "rootless_keypairs_only": true, "comment": "Programmatic GitOps SUSE AppCo Root of Trust"}}'
            
            ROT_RESP=$(curl -sk -X POST "${NV_API}/scan/sigstore/root_of_trust" \
              -H "Content-Type: application/json" \
              -H "X-Auth-Token: ${TOKEN}" \
              -d "$ROT_PAYLOAD")
            echo "API Response: $ROT_RESP"
            
            echo -e "\n3. Registering the Keypair Verifier..."
            # FIXED: Wrapped payload in the "verifier" object
            VERIFIER_PAYLOAD=$(jq -n \
              --arg name "suse-appco-key" \
              --arg type "keypair" \
              --rawfile pub /keys/appco-pubkey.pem \
              '{verifier: {name: $name, verifier_type: $type, public_key: $pub}}')
            
            VERIFIER_RESP=$(curl -sk -X POST "${NV_API}/scan/sigstore/root_of_trust/suse-appco/verifier" \
              -H "Content-Type: application/json" \
              -H "X-Auth-Token: ${TOKEN}" \
              -d "$VERIFIER_PAYLOAD")
            echo "API Response: $VERIFIER_RESP"
              
            echo -e "\nConfiguration complete!"
        volumeMounts:
        - name: pubkey-vol
          mountPath: /keys
      restartPolicy: OnFailure
      volumes:
      - name: pubkey-vol
        configMap:
          name: suse-appco-public-key