apiVersion: neuvector.com/v1
kind: NvWafSecurityRule
metadata:
  name: sql-injection
  namespace: juice-shop
spec:
  sensor:
    name: sql-injection
    comment: "OWASP Top 10 Injection Mitigation custom regex sensor"
    rules:
      - name: auth-bypass
        patterns:
          - key: pattern
            op: regex
            value: |
              '(?:\s|[^a-zA-Z0-9_])OR(?:\s+|\()1=1(?:-|\s*\)|[^a-zA-Z0-9_])
            context: packet
---
apiVersion: neuvector.com/v1
kind: NvSecurityRule
metadata:
  name: nv.juice-shop.juice-shop
  namespace: juice-shop
spec:
  target:
    policymode: Protect
    selector:
      name: nv.juice-shop.juice-shop
      criteria:
        - key: domain
          op: "="
          value: juice-shop
        - key: service
          op: "="
          value: juice-shop.juice-shop
  waf:
    status: true
    settings:
      - name: sql-injection
        action: deny
  ingress:
    - action: allow
      ports: any
      applications:
        - HTTP
      name: allow-ingress-web
      selector:
        name: external # "external" is a built-in NeuVector group for traffic outside the mesh/cluster
  # Keep these arrays explicitly defined as empty so Fleet maps them correctly
  egress: []
  process: []
  file: []
