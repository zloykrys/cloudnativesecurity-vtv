apiVersion: neuvector.com/v1
kind: NvWafSecurityRule
metadata:
  name: sql-injection
  namespace: juice-shop
spec:
  sensor:
    name: sql-injection
    comment: "OWASP Top 10 Injection Mitigation custom regex sensor"
    rules:
      - name: auth-bypass
        patterns:
          - key: pattern
            op: regex
            value: |
              '(?:\s|[^a-zA-Z0-9_])OR(?:\s+|\()1=1(?:-|\s*\)|[^a-zA-Z0-9_])
            context: packet
---
apiVersion: neuvector.com/v1
kind: NvSecurityRule
metadata:
  name: juice-shop-custom-waf # Clean, static custom name
  namespace: juice-shop
spec:
  target:
    policymode: Protect # Strictest mode wins: forces the pods into Protect
    selector:
      name: juice-shop-custom-waf
      criteria:
        - key: domain
          op: "="
          value: juice-shop
        - key: service
          op: "="
          value: juice-shop.juice-shop
  waf:
    status: true
    settings:
      - name: sql-injection
        action: deny
  
  # EXPLICIT DECOUPLING: Disables process enforcement so Node.js boots from scratch
  process_profile:
    baseline: basic
    mode: Discover

  # NETWORK PASS-THROUGH: Prevents 502 Bad Gateway
  ingress:
    - action: allow
      ports: any
      applications:
        - any
      name: gitops-allow-ingress
      selector:
        name: any
  egress:
    - action: allow
      ports: any
      applications:
        - any
      name: gitops-allow-egress
      selector:
        name: any
  process: []
  file: []
