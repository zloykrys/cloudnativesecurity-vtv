apiVersion: neuvector.com/v1
kind: NvWafSecurityRule
metadata:
  name: sql-injection
  namespace: juice-shop
spec:
  sensor:
    name: sql-injection
    comment: "OWASP Top 10 Injection Mitigation custom regex sensor"
    rules:
      - name: auth-bypass
        patterns:
          - key: pattern
            op: regex
            value: |
              '(?:\s|[^a-zA-Z0-9_])OR(?:\s+|\()1=1(?:-|\s*\)|[^a-zA-Z0-9_])
            context: packet
---
apiVersion: neuvector.com/v1
kind: NvSecurityRule
metadata:
  name: nv.juice-shop.juice-shop
  namespace: juice-shop
spec:
  target:
    policymode: Protect
    selector:
      name: nv.juice-shop.juice-shop
      criteria:
        - key: domain
          op: "="
          value: juice-shop
        - key: service
          op: "="
          value: juice-shop.juice-shop
  waf:
    status: true
    settings:
      - name: sql-injection
        action: deny
        
  # Leave process enforcement decoupled so Node.js can boot cleanly
  process_profile:
    baseline: basic
    mode: Discover
    
  ingress:
    # 1. ALLOW THE HOST-NETWORKED INGRESS (Fixes the Implicit Deny log)
    - action: allow
      ports: any
      applications:
        - HTTP
      name: allow-rke2-ingress
      selector:
        name: Workload:ingress
        
    # 2. ALLOW CLUSTER NODES (Fallback for hostNetwork routing)
    - action: allow
      ports: any
      applications:
        - HTTP
      name: allow-cluster-nodes
      selector:
        name: nodes
        
    # 3. Standard container boundaries
    - action: allow
      ports: any
      applications:
        - HTTP
      name: allow-internal-containers
      selector:
        name: containers
        
    - action: allow
      ports: any
      applications:
        - HTTP
      name: allow-external-traffic
      selector:
        name: external
        
  egress: []
  process: []
  file: []
