apiVersion: neuvector.com/v1
kind: NvWafSecurityRule
metadata:
  name: sql-injection
  namespace: juice-shop
spec:
  sensor:
    name: sql-injection
    comment: "OWASP Top 10 Injection Mitigation custom regex sensor"
    rules:
      - name: auth-bypass
        patterns:
          - key: pattern
            op: regex
            value: |
              '(?:\s|[^a-zA-Z0-9_])OR(?:\s+|\()1=1(?:-|\s*\)|[^a-zA-Z0-9_])
            context: packet
---
apiVersion: neuvector.com/v1
kind: NvSecurityRule
metadata:
  name: juice-shop-custom-waf
  namespace: juice-shop
spec:
  target:
    policymode: Protect
    selector:
      name: juice-shop-custom-waf
      criteria:
        # MAGIC FIX: Targeting the label stops NeuVector from absorbing and deleting this CRD
        - key: label
          op: "="
          value: app=juice-shop
        - key: domain
          op: "="
          value: juice-shop
  waf:
    status: true
    settings:
      - name: sql-injection
        action: deny
  
  # Process decoupled: Node.js boots normally
  process_profile:
    baseline: basic
    mode: Discover

  # Network Pass-through: Prevents 502 Bad Gateway
  ingress:
    - action: allow
      ports: any
      applications:
        - any
      name: gitops-allow-ingress
      selector:
        name: any
  egress:
    - action: allow
      ports: any
      applications:
        - any
      name: gitops-allow-egress
      selector:
        name: any
  process: []
  file: []
