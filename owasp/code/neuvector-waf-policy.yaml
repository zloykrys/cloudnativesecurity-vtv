apiVersion: neuvector.com/v1
kind: NvWafSecurityRule
metadata:
  name: sql-injection
  namespace: juice-shop
spec:
  sensor:
    name: sql-injection
    comment: "OWASP Top 10 Injection Mitigation custom regex sensor"
    rules:
      - name: auth-bypass
        patterns:
          - key: pattern
            op: regex
            value: |
              '(?:\s|[^a-zA-Z0-9_])OR(?:\s+|\()1=1(?:-|\s*\)|[^a-zA-Z0-9_])
            context: packet
---
apiVersion: neuvector.com/v1
kind: NvSecurityRule
metadata:
  name: nv.juice-shop.juice-shop
  namespace: juice-shop
spec:
  target:
    policymode: Protect
    selector:
      name: nv.juice-shop.juice-shop
      criteria:
        - key: domain
          op: "="
          value: juice-shop
        - key: service
          op: "="
          value: juice-shop.juice-shop
  waf:
    status: true
    settings:
      - name: sql-injection
        action: deny
  process_profile:
    baseline: basic
    mode: Discover
  ingress:
    # Uses official reserved groups to pass validation and allow ingress proxy traffic
    - action: allow
      ports: any
      applications:
        - HTTP
      name: allow-internal-ingress
      selector:
        name: containers
    - action: allow
      ports: any
      applications:
        - HTTP
      name: allow-external-ingress
      selector:
        name: external
  egress:
    - action: allow
      ports: any
      applications:
        - any
      name: allow-external-egress
      selector:
        name: external
    - action: allow
      ports: any
      applications:
        - any
      name: allow-internal-egress
      selector:
        name: containers
  process: []
  file: []
