apiVersion: neuvector.com/v1
kind: NvWafSecurityRule
metadata:
  name: sql-injection
  namespace: juice-shop
spec:
  sensor:
    name: sql-injection
    comment: "OWASP Top 10 Injection Mitigation custom regex sensor"
    rules:
      - name: auth-bypass
        patterns:
          - key: pattern
            op: regex
            value: |
              '(?:\s|[^a-zA-Z0-9_])OR(?:\s+|\()1=1(?:-|\s*\)|[^a-zA-Z0-9_])
            context: packet
---
apiVersion: neuvector.com/v1
kind: NvSecurityRule
metadata:
  name: nv.juice-shop.juice-shop # MATCHES NEUVECTOR SYSTEM NAME
  namespace: juice-shop
spec:
  target:
    polymode: Protect # PROMOTES WORKLOAD TO PROTECT MODE
    selector:
      name: nv.juice-shop.juice-shop
      criteria:
        - key: domain
          op: "="
          value: juice-shop
        - key: service
          op: "="
          value: juice-shop.juice-shop
  waf:
    status: true
    settings:
      - name: sql-injection
        action: deny
        status: true
  # Keeps discovered baselines intact so the container can run normally in Protect Mode
  process_profile:
    baseline: basic
    mode: Discover
  process:
    - action: allow
      allow_update: false
      name: MainThread
      path: /nodejs/bin/node
    - action: allow
      allow_update: false
      name: pause
      path: /pause
  egress:
    - action: allow
      applications:
        - DNS
      name: nv.rke2-coredns-rke2-coredns.kube-system-egress-0
      ports: any
      selector:
        criteria:
          - key: service
            op: "="
            value: rke2-coredns-rke2-coredns.kube-system
          - key: domain
            op: "="
            value: kube-system
        name: nv.rke2-coredns-rke2-coredns.kube-system
    - action: allow
      applications:
        - SSL
      name: external-egress-1
      ports: any
      selector:
        name: external
  ingress: []
  file: []
