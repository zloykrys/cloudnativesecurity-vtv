defaultNamespace: juice-shop

labels:
  app: juice-shop-security-demo
  team: security-operations

targets:
  - name: development-or-test-clusters
    clusterSelector: {}

diff:
  comparePatches:
    - apiVersion: neuvector.com/v1
      kind: NvSecurityRule
      name: nv.juice-shop.juice-shop
      namespace: juice-shop
      operations:
        # Strips out live traffic metrics injected by NeuVector
        - op: remove
          path: /spec/target/selector/grp_band_width
        - op: remove
          path: /spec/target/selector/grp_sess_cur
        - op: remove
          path: /spec/target/selector/grp_sess_rate
        - op: remove
          path: /spec/target/selector/mon_metric
        - op: remove
          path: /spec/target/selector/comment
        - op: remove
          path: /spec/target/selector/original_name
