defaultNamespace: juice-shop

labels:
  app: juice-shop-security-demo
  team: security-operations

targets:
  - name: development-or-test-clusters
    clusterSelector: {}

diff:
  comparePatches:
    - apiVersion: neuvector.com/v1
      kind: NvSecurityRule
      name: nv.juice-shop.juice-shop
      namespace: juice-shop
      operations:
        # Prevents Fleet from tracking any modifications made by NeuVector
        - op: remove
          path: /spec
        - op: remove
          path: /metadata/labels
        - op: remove
          path: /metadata/annotations
